name: Daily Market Report

on:
  schedule:
    # 00:00 UTC = 09:00 KST (한국은 서머타임 없음)
    - cron: '0 0 * * *'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  # generate/notify 둘 다 config 검증에 5개 값을 모두 필요로 한다.
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
  FMP_API_KEY: ${{ secrets.FMP_API_KEY }}

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Generate dashboard
        run: npm run generate:dashboard

      - name: Upload dashboard artifact (for Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Upload pending Telegram message (for notify job)
        uses: actions/upload-artifact@v4
        with:
          name: telegram-message
          path: artifacts/telegram-message.txt
          retention-days: 1

  deploy:
    needs: generate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download pending Telegram message
        uses: actions/download-artifact@v4
        with:
          name: telegram-message
          path: artifacts

      - name: Send Telegram notification
        run: npm run notify:dashboard
